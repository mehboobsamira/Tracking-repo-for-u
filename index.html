<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Tree Animation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #050508;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
        }

        /* Blue Tree Styling */
        svg {
            width: 80%;
            max-width: 400px;
            filter: drop-shadow(0 0 15px #00d2ff);
        }

        path {
            fill: none;
            stroke: #00d2ff; /* Cinematic Blue */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Final Text Styling */
        #final-text {
            position: absolute;
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 1.8rem;
            text-align: center;
            opacity: 0;
            text-shadow: 0 0 20px #00d2ff, 0 0 40px #0077ff;
            transform: translateY(20px);
        }

        /* Magical Particles */
        canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <svg viewBox="0 0 200 200" id="tree-svg">
            <path id="tree-path" d="M100,180 C100,180 80,160 80,140 C80,120 100,110 100,90 M100,180 C100,180 120,160 120,140 C120,120 100,110 100,90 M100,90 L100,50 M100,75 L70,50 M100,75 L130,50 M100,60 L85,35 M100,60 L115,35" />
        </svg>

        <div id="final-text">I Love You Jaan 💕🤌</div>
    </div>

    <canvas id="particles"></canvas>

<script>
    const path = document.querySelector('#tree-path');
    const length = path.getTotalLength();

    // Prepare path for animation
    path.style.strokeDasharray = length;
    path.style.strokeDashoffset = length;

    const tl = gsap.timeline();

    // 1. Slow Motion Tree Growth (6 Seconds)
    tl.to(path, {
        strokeDashoffset: 0,
        duration: 6,
        ease: "power1.inOut"
    });

    // 2. Dissolve Tree and Show Final Text
    tl.to("#tree-svg", {
        opacity: 0,
        scale: 1.2,
        filter: "blur(10px)",
        duration: 1.5
    }, "+=0.5");

    tl.to("#final-text", {
        opacity: 1,
        y: 0,
        duration: 2,
        ease: "back.out(1.7)"
    }, "-=1");

    // Background Particle logic for "Magic"
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, dots = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    for(let i=0; i<30; i++) {
        dots.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 2,
            v: Math.random() * 0.3 + 0.1
        });
    }

    function render() {
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "rgba(0, 210, 255, 0.4)";
        dots.forEach(d => {
            d.y -= d.v;
            if(d.y < 0) d.y = h;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
